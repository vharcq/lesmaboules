#################################### Server ####################################
[server]
# Change le port si nécessaire (ex: 8080 au lieu de 3000)
http_port = 3000

# Pour autoriser un accès distant (changer `localhost` en `0.0.0.0`)
http_addr = 0.0.0.0

# Pour activer/désactiver HTTPS
protocol = http
cert_file =
cert_key =

#################################### Security ####################################
[security]
# Désactiver la création de compte anonyme (true/false)
allow_sign_up = false

# Changer l'admin par défaut (optionnel)
admin_user = admin
admin_password = changeme123

#################################### Database ####################################
[database]
# Type de base de données : sqlite3, mysql, postgres
type = sqlite3
path = data/grafana.db

#################################### Logging ####################################
[log]
mode = console
level = info
